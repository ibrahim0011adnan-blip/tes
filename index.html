<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- ڕێگری لە زووم بوونی ئایفۆن و ڕێکخستنی قەبارە -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Satoru Hub - iPhone Optimized ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { --primary: #8a2be2; --bg-dark: #0a0a0a; }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; /* لادانی ڕەنگی شینی دەوری دوگمە لە ئایفۆن */
        }

        body { 
            margin: 0; background: var(--bg-dark); overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            color: white; position: fixed; width: 100%; height: 100%; 
        }

        /* --- Home Page --- */
        #home-page {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 20px;
            border: 1px solid var(--primary); text-align: center; width: 80%; max-width: 280px;
        }

        .avatar-circle {
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary);
            margin: 0 auto 10px; background: #222; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        .room-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 90%; max-width: 320px; margin-top: 15px; }
        .room-btn { 
            background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; 
            border-radius: 12px; font-size: 13px; font-weight: bold;
        }

        /* --- Game UI --- */
        #game-overlay { display: none; position: relative; width: 100%; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; }

        #action-bar { 
            position: absolute; bottom: 30px; right: 15px; 
            display: flex; flex-direction: column; gap: 10px; z-index: 100; 
        }

        .act-btn { 
            width: 46px; height: 46px; background: rgba(26, 26, 26, 0.9); 
            border: 1px solid var(--primary); color: white; border-radius: 50%; 
            font-size: 20px; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }

        #chat-wrapper { 
            position: absolute; bottom: 30px; right: 75px; 
            display: flex; flex-direction: column; align-items: flex-end; z-index: 100;
        }

        #chat-input { 
            width: 140px; padding: 10px 15px; border-radius: 20px; 
            border: 1px solid var(--primary); background: rgba(0,0,0,0.8); 
            color: white; font-size: 16px; /* پێویستە ١٦ بێت بۆ ئەوەی ئایفۆن زووم نەکات */
            outline: none;
        }

        /* --- Stats --- */
        .top-stats {
            position: absolute; top: 40px; left: 15px; display: flex; gap: 8px; z-index: 100;
        }
        .stat-box {
            background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 15px;
            font-size: 12px; border: 1px solid var(--primary); backdrop-filter: blur(5px);
        }

        /* --- Modal --- */
        #crop-modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 3000; flex-direction: column; align-items: center; justify-content: center; 
        }
    </style>
</head>
<body>

    <div id="home-page">
        <div class="profile-card">
            <div class="avatar-circle" id="home-avatar-view">👤</div>
            <h3 id="display-name" style="margin: 5px 0;">Ibrahim</h3>
            <div style="background: #ffd700; color: #000; padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: bold;">💰 <span id="coin-count">1,250</span></div>
        </div>
        <div class="room-list">
            <button class="room-btn" onclick="joinRoom('Lobby 1')">🏰 ژووری ١</button>
            <button class="room-btn" onclick="joinRoom('Cafe')">☕ کافێ</button>
            <button class="room-btn" onclick="openSettings()" style="grid-column: span 2; background: var(--primary); border: none;">⚙️ ڕێکخستنی پرۆفایل</button>
        </div>
    </div>

    <div id="crop-modal">
        <div style="background: #111; padding: 15px; border-radius: 20px; width: 90%; max-width: 320px; text-align: center;">
            <input type="file" id="avatar-upload" accept="image/*" style="width: 100%; margin-bottom: 10px;">
            <input type="text" id="name-input" placeholder="ناوەکەت..." style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 10px; background: #000; color: white; border: 1px solid #333;">
            <div id="crop-wrapper" style="height: 200px; display: none; margin-bottom: 10px; overflow: hidden;">
                <img id="crop-image" style="max-width: 100%;">
            </div>
            <button class="room-btn" style="width: 100%; background: var(--primary);" onclick="saveSettings()">پاشەکەوت ✅</button>
            <button class="room-btn" style="width: 100%; margin-top: 5px; background: #333;" onclick="closeSettings()">پاشگەزبوونەوە</button>
        </div>
    </div>

    <div id="game-overlay">
        <div class="top-stats">
            <div class="stat-box">📍 <span id="room-name">Lobby</span></div>
            <div class="stat-box" style="border-color: #ffd700;">💰 1,250</div>
        </div>

        <div id="chat-wrapper">
            <input type="text" id="chat-input" placeholder="نامەیەک...">
        </div>

        <div id="action-bar">
            <button class="act-btn" onclick="setAction('dance')">💃</button>
            <button class="act-btn" onclick="spawnHearts()">❤️</button>
            <button class="act-btn" onclick="setAction('fly')">🚀</button>
            <button class="act-btn" style="background:#800 !important;" onclick="logOut()">🚪</button>
        </div>
        
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const chatInput = document.getElementById('chat-input');

        let player = { x: 0, y: 0, tx: 0, ty: 0, name: "Ibrahim", scaleX: 1, avatar: null };
        const charImg = new Image(); charImg.src = 'char.png'; 
        const lobbyBg = new Image(); lobbyBg.src = 'room1.jpg';
        const heartImg = new Image(); heartImg.src = 'heart.png';
        const bubbleImg = new Image(); bubbleImg.src = 'ChatBubble.png';

        let inGame = false, cropper, action = null, chatMessage = "", chatTimer = 0, particles = [];

        function openSettings() { document.getElementById('crop-modal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('crop-modal').style.display = 'none'; }

        document.getElementById('avatar-upload').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = document.getElementById('crop-image');
                img.src = event.target.result;
                document.getElementById('crop-wrapper').style.display = 'block';
                if (cropper) cropper.destroy();
                cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1 });
            };
            reader.readAsDataURL(file);
        };

        function saveSettings() {
            const newName = document.getElementById('name-input').value;
            if(newName) {
                player.name = newName;
                document.getElementById('display-name').innerText = newName;
            }
            if(cropper) {
                const url = cropper.getCroppedCanvas().toDataURL();
                player.avatar = new Image();
                player.avatar.src = url;
                document.getElementById('home-avatar-view').innerHTML = `<img src="${url}" style="width:100%; height:100%;">`;
            }
            closeSettings();
        }

        function joinRoom(name) {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('game-overlay').style.display = 'block';
            document.getElementById('room-name').innerText = name;
            inGame = true;
            resize();
            player.x = canvas.width/2; player.y = canvas.height*0.8;
            player.tx = player.x; player.ty = player.y;
            loop();
        }

        function logOut() {
            inGame = false;
            document.getElementById('home-page').style.display = 'flex';
            document.getElementById('game-overlay').style.display = 'none';
        }

        function setAction(type) { action = type; setTimeout(() => { action = null; }, 3000); }
        
        function spawnHearts() {
            for (let i = 0; i < 8; i++) {
                particles.push({ x: player.x, y: player.y - 100, size: 25, sy: 2+Math.random()*3, vx: (Math.random()-0.5)*4, op: 1 });
            }
        }

        chatInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && chatInput.value.trim()) {
                chatMessage = chatInput.value; chatTimer = 180; chatInput.value = ""; chatInput.blur();
            }
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);

        function loop() {
            if(!inGame) return;
            player.x += (player.tx - player.x) * 0.1;
            player.y += (player.ty - player.y) * 0.1;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(lobbyBg.complete) ctx.drawImage(lobbyBg, 0, 0, canvas.width, canvas.height);

            // Particles
            particles.forEach((p, i) => {
                ctx.save(); ctx.globalAlpha = p.op;
                if(heartImg.complete && heartImg.width > 0) ctx.drawImage(heartImg, p.x-12, p.y, p.size, p.size);
                else { ctx.font="20px Arial"; ctx.fillText("❤️", p.x, p.y); }
                ctx.restore();
                p.y -= p.sy; p.x += p.vx; p.op -= 0.01;
                if(p.op <= 0) particles.splice(i, 1);
            });

            // Character
            ctx.save();
            ctx.translate(player.x, player.y);
            let jump = (action === 'dance') ? Math.sin(Date.now()*0.02)*15 : (action === 'fly' ? -100 : 0);

            ctx.fillStyle = "white"; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "center";
            ctx.fillText(player.name, 0, -145 + jump);

            ctx.scale(player.scaleX, 1);
            if(charImg.complete) ctx.drawImage(charImg, -60, -130 + jump, 120, 120);
            if(player.avatar) {
                ctx.save(); ctx.beginPath(); ctx.arc(0, -80 + jump, 20, 0, Math.PI*2); ctx.clip();
                ctx.drawImage(player.avatar, -20, -100 + jump, 40, 40); ctx.restore();
            }
            ctx.restore();

            // Chat
            if (chatMessage && chatTimer > 0) {
                if(bubbleImg.complete) ctx.drawImage(bubbleImg, player.x-80, player.y-210, 160, 70);
                ctx.fillStyle = "black"; ctx.font = "12px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(chatMessage, player.x, player.y-175);
                chatTimer--;
            }

            requestAnimationFrame(loop);
        }

        // باشکردنی لەمس بۆ ئایفۆن
        const handleTouch = (e) => {
            if(!inGame || e.target.closest('#action-bar') || e.target.tagName === 'INPUT') return;
            const touch = e.touches ? e.touches[0] : e;
            player.tx = touch.clientX;
            player.ty = Math.max(canvas.height * 0.4, Math.min(canvas.height * 0.9, touch.clientY));
            player.scaleX = (player.tx > player.x) ? 1 : -1;
        };

        canvas.addEventListener('touchstart', handleTouch, {passive: false});
        canvas.addEventListener('mousedown', handleTouch);
    </script>
</body>
</html>
