<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Satoru Hub - Multiplayer & Money ✨</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #main-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(15, 15, 15, 0.98); padding: 25px; border-radius: 20px; border: 2px solid #5d34a5; width: 85%; max-width: 360px; z-index: 1000; box-shadow: 0 0 30px rgba(93, 52, 165, 0.3); }
        
        .google-btn { 
            background: white; color: #444; border: none; padding: 15px; border-radius: 12px; 
            cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: 15px; transition: 0.3s;
        }
        
        .start-btn { background: #5d34a5; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        
        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }
        #chat-input { position: absolute; bottom: 100px; right: 20px; width: 250px; padding: 12px; border-radius: 25px; border: 1px solid #5d34a5; background: rgba(0,0,0,0.6); color: white; backdrop-filter: blur(10px); text-align: center; outline: none; font-size: 16px; z-index: 100; }
        
        #action-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; z-index: 100; width: 98%; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 20px; backdrop-filter: blur(10px); }
        .act-btn { padding: 10px 0; background: #222; border: 1px solid #5d34a5; color: white; border-radius: 12px; font-size: 18px; cursor: pointer; text-align: center; }
        #room-tag { position: absolute; top: 20px; left: 20px; background: rgba(93, 52, 165, 0.4); padding: 5px 15px; border-radius: 15px; font-size: 14px; border: 1px solid #5d34a5; z-index: 200; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h2 style="color: #8a4fff; margin-bottom: 20px;">Satoru Hub</h2>
        <button class="google-btn" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/layout/google.svg" width="20">
            بەردەوامبوون بە Google
        </button>
        <div style="margin: 10px 0; color: #555;">یان بە میوانی</div>
        <input type="text" id="user-name" style="width:90%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #333; color:white; border-radius:8px; text-align:center;" value="Ibrahim">
        <button class="start-btn" onclick="enterRoom()">دەستپێکردن ✨</button>
    </div>

    <div id="game-ui">
        <div id="room-tag">Lobby</div>
        <input type="text" id="chat-input" placeholder="نامەیەک بنوسە...">
        <div id="action-bar">
            <button class="act-btn" onclick="setAction('dance')">💃</button>
            <button class="act-btn" onclick="setAction('sleep')">😴</button>
            <button class="act-btn" onclick="setAction('money')">💸</button>
            <button class="act-btn" onclick="setAction('shock')">⚡</button>
            <button class="act-btn" onclick="setAction('fly')">🚀</button>
            <button class="act-btn" style="background:#ff4d4d !important;" onclick="location.reload()">🚪</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // --- 1. Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCZOjVeUg4cPILA5eMSGbDURN8qMvCbZJQ",
            authDomain: "satoru-hub-9806d.firebaseapp.com",
            projectId: "satoru-hub-9806d",
            databaseURL: "https://satoru-hub-9806d-default-rtdb.firebaseio.com",
            appId: "1:340283464699:web:c9b3c09ce029d4dd6b895e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- 2. Game Variables ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let localId = "guest_" + Math.floor(Math.random()*1000);
        let myPlayer = { x: 0, y: 0, tx: 0, ty: 0, name: "Ibrahim", avatar: "", scaleX: 1, action: null, chat: "", chatT: 0 };
        let allPlayers = {};
        
        let userAvatarImg = new Image();
        const charImg = new Image(); charImg.src = 'char.png'; 
        const lobbyBg = new Image(); lobbyBg.src = 'room1.jpg';
        const vipBg = new Image(); vipBg.src = 'vip.jpg'; 
        const bubbleImg = new Image(); bubbleImg.src = 'ChatBubble.png';
        const sleepImg = new Image(); sleepImg.src = 'sleep.png';
        const moneyImg = new Image(); moneyImg.src = 'money.png'; 

        let currentBg = lobbyBg;
        let currentRoomName = "Lobby";
        let inGame = false;
        let particles = [];

        // --- 3. Authentication ---
        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                localId = result.user.uid;
                myPlayer.name = result.user.displayName;
                myPlayer.avatar = result.user.photoURL;
                enterRoom();
            } catch (e) { alert("کێشە لە لۆگین هەیە"); }
        }

        function enterRoom() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            inGame = true;
            myPlayer.name = document.getElementById('user-name').value || myPlayer.name;
            
            myPlayer.x = canvas.width/2; myPlayer.y = canvas.height*0.8;
            myPlayer.tx = myPlayer.x; myPlayer.ty = myPlayer.y;

            // Sync with Firebase
            db.ref('players/' + localId).onDisconnect().remove();
            db.ref('players').on('value', (snap) => {
                allPlayers = snap.val() || {};
            });

            setInterval(() => {
                if(inGame) db.ref('players/' + localId).set(myPlayer);
            }, 50);

            loop();
        }

        // --- 4. Logic & Rendering ---
        function setAction(type) { myPlayer.action = type; setTimeout(() => myPlayer.action = null, 5000); }

        function spawnMoney(x, y) {
            particles.push({
                x: x + (Math.random() - 0.5) * 60,
                y: y - 120,
                size: 25 + Math.random() * 20,
                speedY: 2 + Math.random() * 3,
                opacity: 1,
                vx: (Math.random() - 0.5) * 4,
                rot: Math.random() * Math.PI * 2,
                rotV: (Math.random() - 0.5) * 0.1
            });
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        function loop() {
            if(!inGame) return;

            // Update local move
            myPlayer.x += (myPlayer.tx - myPlayer.x) * 0.1;
            myPlayer.y += (myPlayer.ty - myPlayer.y) * 0.1;
            if(myPlayer.chatT > 0) myPlayer.chatT--; else myPlayer.chat = "";

            // Room Switch
            if (myPlayer.x > canvas.width - 40 && currentRoomName === "Lobby") {
                currentBg = vipBg; currentRoomName = "VIP Room";
                document.getElementById('room-tag').innerText = "VIP Room 💎";
                myPlayer.x = 60; myPlayer.tx = 60;
            } else if (myPlayer.x < 40 && currentRoomName === "VIP Room") {
                currentBg = lobbyBg; currentRoomName = "Lobby";
                document.getElementById('room-tag').innerText = "Lobby";
                myPlayer.x = canvas.width - 60; myPlayer.tx = canvas.width - 60;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(currentBg.complete) ctx.drawImage(currentBg, 0, 0, canvas.width, canvas.height);

            // Draw Particles
            particles.forEach((p, index) => {
                ctx.save();
                ctx.globalAlpha = p.opacity;
                ctx.translate(p.x, p.y); ctx.rotate(p.rot);
                if(moneyImg.complete) ctx.drawImage(moneyImg, -p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
                p.y -= p.speedY; p.x += p.vx; p.rot += p.rotV; p.opacity -= 0.012;
                if (p.opacity <= 0) particles.splice(index, 1);
            });

            // Draw All Players
            Object.keys(allPlayers).forEach(id => {
                const p = allPlayers[id];
                drawPlayer(p);
            });

            requestAnimationFrame(loop);
        }

        function drawPlayer(p) {
            ctx.save();
            ctx.translate(p.x, p.y);
            
            // Shadow
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.beginPath(); ctx.ellipse(0, -22, 40, 15, 0, 0, Math.PI*2); ctx.fill();

            // Chat
            if (p.chat && bubbleImg.complete) {
                ctx.drawImage(bubbleImg, -80, -240, 215, 107);
                ctx.fillStyle = "black"; ctx.textAlign = "center"; ctx.font = "bold 14px Arial";
                ctx.fillText(p.chat, 27, -185);
            }

            let jump = 0, rot = 0, sc = 1;
            if (p.action === 'dance') jump = Math.sin(Date.now() * 0.015) * 15;
            if (p.action === 'money') { if(Math.random() < 0.2) spawnMoney(p.x, p.y); }
            if (p.action === 'fly') jump = -Math.abs(Math.sin(Date.now() * 0.01)) * 80;
            if (p.action === 'sleep') { 
                rot = Math.PI / 2; jump = 50;
                if(sleepImg.complete) ctx.drawImage(sleepImg, -30, -220, 60, 60);
            }

            ctx.translate(0, jump);
            ctx.rotate(rot);

            // Name
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 15px Arial";
            ctx.fillText(p.name, 0, -135);

            // Body
            ctx.scale(p.scaleX, 1);
            if(charImg.complete) ctx.drawImage(charImg, -80, -160, 160, 160);
            
            // Avatar (Google Photo)
            if(p.avatar) {
                let av = new Image(); av.src = p.avatar;
                ctx.save();
                ctx.beginPath(); ctx.arc(0, -120, 27, 0, Math.PI*2); ctx.clip();
                if(av.complete) ctx.drawImage(av, -27, -147, 54, 54);
                ctx.restore();
            }

            ctx.restore();
        }

        // --- 5. Event Listeners ---
        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                myPlayer.chat = this.value; myPlayer.chatT = 180;
                this.value = ""; this.blur();
            }
        });

        window.addEventListener('mousedown', (e) => { 
            if(!inGame || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return; 
            myPlayer.tx = e.clientX; 
            myPlayer.ty = Math.max(canvas.height*0.5, Math.min(canvas.height*0.95, e.clientY)); 
            myPlayer.scaleX = (myPlayer.tx > myPlayer.x) ? 1 : -1; 
        });
    </script>
</body>
</html>
