<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satoru Hub - Perfect Shadow ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #main-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(15, 15, 15, 0.98); padding: 25px; border-radius: 20px; border: 2px solid #5d34a5; width: 85%; max-width: 360px; z-index: 1000; }
        .file-input { margin: 15px 0; font-size: 14px; background: #222; padding: 10px; border-radius: 8px; width: 90%; color: #888; }
        .start-btn { background: #5d34a5; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(93, 52, 165, 0.4); }
        #crop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .crop-container { width: 90%; max-width: 400px; max-height: 70vh; background: #111; overflow: hidden; }
        .crop-controls { margin-top: 20px; display: flex; gap: 10px; }
        .crop-btn { background: #5d34a5; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }
        #chat-input { position: absolute; bottom: 100px; right: 20px; width: 250px; padding: 12px; border-radius: 25px; border: 1px solid #5d34a5; background: rgba(0,0,0,0.6); color: white; backdrop-filter: blur(10px); text-align: center; outline: none; font-size: 16px; z-index: 100; }
        #action-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; z-index: 100; width: 95%; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 20px; backdrop-filter: blur(10px); }
        .act-btn { padding: 10px 0; background: #222; border: 1px solid #5d34a5; color: white; border-radius: 12px; font-size: 18px; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h2 style="color: #5d34a5; margin-bottom: 5px;">Satoru Hub</h2>
        <input type="file" id="avatar-upload" class="file-input" accept="image/*">
        <input type="text" id="user-name" style="width:90%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #333; color:white; border-radius:8px; text-align:center;" value="Ibrahim">
        <button class="start-btn" onclick="enterRoom()">دەستپێکردن ✨</button>
    </div>

    <div id="crop-modal">
        <div class="crop-container"><img id="crop-image" style="max-width: 100%;"></div>
        <div class="crop-controls">
            <button class="crop-btn" onclick="applyCrop()">✅ تەواو</button>
            <button class="crop-btn" style="background:#444;" onclick="closeCrop()">❌ پاشگەزبونەوە</button>
        </div>
    </div>

    <div id="game-ui">
        <input type="text" id="chat-input" placeholder="نامەیەک بنوسە...">
        <div id="action-bar">
            <button class="act-btn" onclick="setAction('dance')">💃</button>
            <button class="act-btn" onclick="setAction('flip')">🌀</button>
            <button class="act-btn" onclick="setAction('fly')">🚀</button>
            <button class="act-btn" onclick="setAction('ghost')">👻</button>
            <button class="act-btn" style="background:#ff4d4d !important;" onclick="location.reload()">🚪</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let player = { x: 0, y: 0, tx: 0, ty: 0, name: "Ibrahim", scaleX: 1 };
        
        let userAvatar = new Image();
        const charImg = new Image(); charImg.src = 'char.png'; 
        const bgImg = new Image(); bgImg.src = 'room1.jpg';
        const bubbleImg = new Image(); bubbleImg.src = 'ChatBubble.png';
        const heartImg = new Image(); heartImg.src = 'heart.png'; 

        let hasAvatar = false, inGame = false, cropper;
        let action = null, timer = 0, chatMessage = "", chatTimer = 0;
        let hearts = []; 

        document.getElementById('avatar-upload').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const imgElement = document.getElementById('crop-image');
                imgElement.src = event.target.result;
                document.getElementById('crop-modal').style.display = 'flex';
                if (cropper) cropper.destroy();
                cropper = new Cropper(imgElement, { aspectRatio: 1, viewMode: 1, autoCropArea: 1 });
            };
            reader.readAsDataURL(file);
        };

        function applyCrop() {
            userAvatar.src = cropper.getCroppedCanvas({ width: 200, height: 200 }).toDataURL();
            hasAvatar = true; closeCrop();
        }
        function closeCrop() { document.getElementById('crop-modal').style.display = 'none'; }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        function enterRoom() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            inGame = true; player.name = document.getElementById('user-name').value;
            player.x = canvas.width/2; player.y = canvas.height*0.8; player.tx = player.x; player.ty = player.y;
            loop();
        }

        function setAction(type) { action = type; timer = 120; }

        function spawnHearts() {
            if (action === 'dance' && Math.random() < 0.15) {
                hearts.push({
                    x: player.x + (Math.random() - 0.5) * 60,
                    y: player.y - 100,
                    size: 20 + Math.random() * 10,
                    speedY: 1 + Math.random() * 2,
                    opacity: 1
                });
            }
        }

        function drawHearts() {
            hearts.forEach((h, index) => {
                ctx.save(); ctx.globalAlpha = h.opacity;
                if(heartImg.complete) ctx.drawImage(heartImg, h.x - h.size/2, h.y - h.size/2, h.size, h.size);
                ctx.restore();
                h.y -= h.speedY; h.opacity -= 0.015;
                if (h.opacity <= 0) hearts.splice(index, 1);
            });
        }

        function drawChatBubble(x, y, text) {
            if (!text || chatTimer <= 0 || !bubbleImg.complete) return;
            ctx.save();
            let bW = 215, bH = 107, bX = x - (bW/2) + 28, bY = y - 220;
            ctx.drawImage(bubbleImg, bX, bY, bW, bH);
            ctx.fillStyle = "black"; ctx.textAlign = "center"; ctx.font = "bold 14px Arial";
            ctx.fillText(text, bX + (bW/2), bY + 55);
            ctx.restore();
        }

        function loop() {
            if(!inGame) return;
            player.x += (player.tx - player.x) * 0.1; player.y += (player.ty - player.y) * 0.1;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(bgImg.complete) ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            
            // سێبەرەکە کرا بە -22 بۆ ئەوەی تەواو بچێتە ناو قاچەکان
            ctx.fillStyle = "rgba(0, 0, 0, 0.3)"; 
            ctx.beginPath(); 
            ctx.ellipse(player.x, player.y - 22, 40, 15, 0, 0, Math.PI*2); 
            ctx.fill();

            drawChatBubble(player.x, player.y, chatMessage);
            if (chatTimer > 0) chatTimer--;
            spawnHearts(); drawHearts();

            ctx.save();
            ctx.translate(player.x, player.y);
            let pSize = 160;
            let dS = (action === 'dance') ? 1 + Math.sin(Date.now() * 0.015) * 0.1 : 1;

            ctx.save();
            ctx.scale(dS, dS);
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 15px Arial";
            ctx.shadowBlur = 5; ctx.shadowColor = "black";
            ctx.fillText(player.name, 0, -128); 
            ctx.restore();

            ctx.save();
            if (action === 'fly') ctx.translate(0, -Math.abs(Math.sin(Date.now() * 0.01)) * 50);
            if (action === 'flip' && timer > 0) ctx.rotate((120 - timer) * (Math.PI * 2 / 40));
            ctx.scale(player.scaleX * dS, dS);
            if (action === 'ghost') ctx.globalAlpha = 0.5;
            ctx.shadowBlur = 20; ctx.shadowColor = "#5d34a5";
            if(charImg.complete) ctx.drawImage(charImg, -pSize/2, -pSize, pSize, pSize);
            if (hasAvatar && userAvatar.complete) ctx.drawImage(userAvatar, -(pSize/2.9)/2, -pSize/1.33, pSize/2.9, pSize/2.9);
            ctx.restore();

            ctx.restore(); 

            if (timer > 0) timer--; else action = null;
            requestAnimationFrame(loop);
        }

        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                chatMessage = this.value; chatTimer = 180; this.value = ""; this.blur();
            }
        });

        window.addEventListener('mousedown', (e) => { 
            if(!inGame || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return; 
            player.tx = e.clientX; 
            player.ty = Math.max(canvas.height*0.5, Math.min(canvas.height*0.95, e.clientY)); 
            player.scaleX = (player.tx > player.x) ? 1 : -1; 
        });
    </script>
</body>
</html>
