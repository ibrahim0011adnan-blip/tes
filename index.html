<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATORU - FIREBASE LIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { 
            --gold: #ffcc33; 
            --deep-obsidian: #050505;
            --purple-glow: #8e44ad; 
            --neon-border: rgba(255, 204, 51, 0.6);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--deep-obsidian); 
            font-family: 'Inter', sans-serif; 
            color: #fff; overflow: hidden; 
        }

        /* --- VOID MENU --- */
        #menu-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: radial-gradient(circle at center, #11021a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .void-card {
            background: rgba(5, 5, 5, 0.95);
            border: 1px solid var(--neon-border);
            padding: 50px; width: 380px; text-align: center;
            box-shadow: 0 0 60px rgba(142, 68, 173, 0.15);
        }

        h1 { 
            color: var(--gold); 
            font-size: 3rem; font-weight: 900; letter-spacing: 12px; 
            margin: 0 0 40px 0; text-transform: uppercase;
        }

        .btn-void {
            display: block; width: 100%; padding: 18px; margin: 12px 0;
            background: transparent; border: 1px solid var(--neon-border);
            color: var(--gold); font-weight: 800; letter-spacing: 2px;
            cursor: pointer; text-transform: uppercase;
            transition: 0.4s;
        }

        .btn-void:hover { background: var(--gold); color: #000; box-shadow: 0 0 25px var(--gold); }

        .room-picker {
            background: #000; border: 1px solid var(--neon-border);
            color: #fff; padding: 15px; width: 100%; margin: 20px 0;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* --- METAVERSE ROOM --- */
        #room-ui { display: none; width: 100vw; height: 100vh; position: relative; background-size: cover; background-position: center; }
        
        #video-screen { 
            position: absolute; top: 31.5%; left: 38.3%; width: 23.2%; height: 19.5%; 
            background: #000; border: 2px solid #1a1a1a;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        /* --- CHARACTER SYSTEM --- */
        #character-master { 
            width: 140px; height: 140px; position: absolute; bottom: 20%; left: 50%; z-index: 100; 
            transition: left 1s cubic-bezier(0.2, 0.8, 0.2, 1), top 1s cubic-bezier(0.2, 0.8, 0.2, 1); 
            pointer-events: none; 
        }

        #chat-bubble { 
            position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%) scale(0);
            width: 160px; height: 160px; background: url('chat.png') center/contain no-repeat;
            display: flex; align-items: center; justify-content: center; transition: 0.5s;
        }

        #bubble-text { color: #fff; font-size: 12px; font-weight: 900; text-align: center; width: 60%; }

        #user-name-tag {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;
            color: #fff; text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .admin-glow { color: var(--gold) !important; text-shadow: 0 0 15px var(--gold) !important; }

        #base-asset { width: 100%; height: 100%; background: url('char.png') center/contain no-repeat; position: relative; }

        #user-photo-overlay { 
            position: absolute; top: 16%; left: 19%; width: 62%; height: 56%; 
            background-size: cover; background-position: center;
            border-radius: 45px 5px 35px 12px; 
        }

        /* --- CONTROL INTERFACE --- */
        #control-deck { 
            position: absolute; bottom: 40px; right: 40px; 
            display: flex; flex-direction: row; gap: 15px; 
        }

        .deck-btn {
            background: rgba(0,0,0,0.9); border: 1px solid var(--neon-border);
            color: var(--gold); padding: 15px 25px; font-weight: 900; font-size: 11px;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        .deck-btn:hover { background: var(--gold); color: #000; }
        .kick-btn { border-color: #ff3333 !important; color: #ff3333 !important; }

        /* --- ADMIN PANEL --- */
        #admin-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1500;
            display: flex; gap: 10px; background: rgba(0,0,0,0.8);
            padding: 10px; border: 1px solid var(--neon-border);
        }
        #yt-input {
            background: #111; border: 1px solid #333; color: var(--gold);
            padding: 8px; width: 250px; outline: none; font-size: 12px;
        }

        .particle { position: absolute; pointer-events: none; z-index: 150; animation: pFlow 3.5s forwards; }
        @keyframes pFlow {
            0% { transform: translate(0,0) scale(0); opacity: 0; }
            20% { opacity: 1; transform: translate(0, -100px) scale(2) rotate(var(--rot)); }
            100% { transform: translate(var(--dx), var(--dy)) scale(0) rotate(calc(var(--rot) * 6)); opacity: 0; }
        }

        #crop-modal { display: none; position: fixed; inset: 0; z-index: 3000; background: #000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body onclick="moveCharacter(event)">

    <audio id="kiss-sound" src="kiss.mp3" preload="auto"></audio>

    <div id="admin-panel" style="display:none;">
        <input type="text" id="yt-input" placeholder="Paste YouTube URL or ID...">
        <button class="deck-btn" style="padding: 8px 15px;" onclick="syncVideo()">Update Stream</button>
    </div>

    <div id="menu-overlay">
        <div class="void-card">
            <h1>SATORU</h1>
            <input type="text" id="username-input" class="room-picker" placeholder="Enter Nickname..." style="margin-top:0;">
            <button class="btn-void" onclick="document.getElementById('file-input').click()">Update Identity</button>
            <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="openCrop(event)">
            <select id="room-selector" class="room-picker">
                <option value="room3.jpg">Neon District</option>
                <option value="room2.jpg">Gold Vault VIP</option>
                <option value="room1.jpg">Obsidian Penthouse</option>
            </select>
            <button class="btn-void" style="background: var(--gold); color: #000;" onclick="initRoom(true)">Create & Admin</button>
        </div>
    </div>

    <div id="crop-modal">
        <div class="void-card" style="width: auto;">
            <div style="max-width: 400px; margin-bottom: 30px;"><img id="crop-image-preview" style="max-width:100%;"></div>
            <button class="btn-void" style="background: var(--gold); color: #000;" onclick="applyCrop()">Confirm Bio-Sync</button>
        </div>
    </div>

    <div id="room-ui">
        <div id="video-screen"><div id="player"></div></div>
        <div id="character-master">
            <div id="user-name-tag">Ibrahim</div>
            <div id="chat-bubble"><div id="bubble-text">Ready</div></div>
            <div id="base-asset"><div id="user-photo-overlay"></div></div>
        </div>
        <div id="control-deck">
            <button id="kick-btn" class="deck-btn kick-btn" style="display:none;" onclick="triggerBubble('System: Kicking User...')">Kick</button>
            <button class="deck-btn" onclick="spawnParticles('heart.png')">Heart</button>
            <button class="deck-btn" onclick="spawnParticles('kiss.png')">Kiss</button>
            <button class="deck-btn" style="color:#888; border-color:#444;" onclick="location.reload()">Exit</button>
        </div>
    </div>

    <!-- FIREBASE SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ADD YOUR CONFIG HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_DOMAIN",
            databaseURL: "YOUR_DB_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID",
            measurementId: "YOUR_MEASUREMENT_ID"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);

        window.initRoom = (creatorMode) => {
            const nickname = document.getElementById('username-input').value || "User";
            const selectedRoom = document.getElementById('room-selector').value;
            
            // Sync Admin State to Firebase
            if(creatorMode) {
                update(ref(db, 'roomState'), {
                    admin: nickname,
                    background: selectedRoom,
                    currentVideo: "dQw4w9WgXcQ"
                });
            }

            document.getElementById('user-name-tag').textContent = nickname;
            document.getElementById('room-ui').style.backgroundImage = `url('${selectedRoom}')`;
            document.getElementById('menu-overlay').style.display = 'none';
            document.getElementById('room-ui').style.display = 'block';

            if(creatorMode) {
                document.getElementById('admin-panel').style.display = 'flex';
                document.getElementById('kick-btn').style.display = 'block';
                document.getElementById('user-name-tag').classList.add('admin-glow');
            }
        };

        // Listen for Global Video Updates
        onValue(ref(db, 'roomState/currentVideo'), (snapshot) => {
            const videoId = snapshot.val();
            if(window.player && videoId) window.player.loadVideoById(videoId);
        });

        window.syncVideo = () => {
            const val = document.getElementById('yt-input').value;
            let videoId = val;
            if (val.includes('v=')) videoId = val.split('v=')[1].split('&')[0];
            else if (val.includes('youtu.be/')) videoId = val.split('youtu.be/')[1].split('?')[0];
            
            if(videoId) update(ref(db, 'roomState'), { currentVideo: videoId });
        };
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player, bubbleTimer, cropper;
        const master = document.getElementById('character-master');
        const overlay = document.getElementById('user-photo-overlay');

        function openCrop(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('crop-image-preview').src = ev.target.result;
                document.getElementById('crop-modal').style.display = 'flex';
                if(cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('crop-image-preview'), { aspectRatio: 1 });
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function applyCrop() {
            overlay.style.backgroundImage = `url(${cropper.getCroppedCanvas().toDataURL()})`;
            document.getElementById('crop-modal').style.display = 'none';
        }

        function onYouTubeIframeAPIReady() { window.player = new YT.Player('player', { height: '100%', width: '100%', videoId: 'dQw4w9WgXcQ' }); }

        function triggerBubble(text) {
            document.getElementById('bubble-text').textContent = text;
            document.getElementById('chat-bubble').style.transform = "translateX(-50%) scale(1)";
            if(bubbleTimer) clearTimeout(bubbleTimer);
            bubbleTimer = setTimeout(() => document.getElementById('chat-bubble').style.transform = "translateX(-50%) scale(0)", 3000);
        }

        function moveCharacter(e) {
            if(e.target.closest('button') || e.target.closest('input')) return;
            master.style.left = (e.clientX - 70) + 'px';
            master.style.top = (e.clientY - 70) + 'px';
        }

        function spawnParticles(img) {
            if(img === 'kiss.png') document.getElementById('kiss-sound').play().catch(()=>{});
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.width = '40px'; p.style.height = '40px';
                    p.style.background = `url('${img}') center/contain no-repeat`;
                    p.style.left = (master.offsetLeft + 50) + 'px';
                    p.style.top = (master.offsetTop - 20) + 'px';
                    p.style.setProperty('--dx', (Math.random() * 600 - 300) + 'px');
                    p.style.setProperty('--dy', '-500px');
                    p.style.setProperty('--rot', (Math.random() * 360) + 'deg');
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 3500);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
