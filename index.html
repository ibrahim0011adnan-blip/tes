<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATORU - MULTI HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { --gold: #ffcc33; --obsidian: #050505; --border: rgba(255, 204, 51, 0.5); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--obsidian); font-family: sans-serif; overflow: hidden; }
        
        #menu-overlay { position: fixed; inset: 0; z-index: 2000; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .void-card { border: 1px solid var(--border); padding: 40px; text-align: center; background: #080808; width: 320px; }
        .btn-void { width: 100%; padding: 15px; margin: 10px 0; background: transparent; border: 1px solid var(--border); color: var(--gold); cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn-void:hover { background: var(--gold); color: #000; }
        
        #room-ui { display: none; width: 100vw; height: 100vh; position: relative; background-size: cover; background-position: center; }
        
        /* CHARACTER STYLE */
        .character { width: 120px; height: 120px; position: absolute; transition: all 0.5s ease; pointer-events: none; }
        .char-base { width: 100%; height: 100%; background: url('char.png') center/contain no-repeat; position: relative; }
        .char-photo { position: absolute; top: 16%; left: 19%; width: 62%; height: 56%; background-size: cover; border-radius: 50%; }
        .char-name { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); color: #fff; font-weight: bold; text-shadow: 0 0 5px #000; white-space: nowrap; }
        
        #video-screen { position: absolute; top: 30%; left: 38%; width: 24%; height: 20%; background: #000; border: 2px solid #222; }
        #crop-modal { display: none; position: fixed; inset: 0; z-index: 3000; background: #000; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body onclick="updateMyLocation(event)">

    <div id="menu-overlay">
        <div class="void-card">
            <h2 style="color:var(--gold)">SATORU HUB</h2>
            <input type="text" id="name-in" placeholder="Your Name..." style="width:90%; padding:10px; margin-bottom:10px;">
            <button class="btn-void" onclick="document.getElementById('file-in').click()">Upload Avatar</button>
            <input type="file" id="file-in" hidden onchange="startCrop(event)">
            <button class="btn-void" style="background:var(--gold); color:#000" onclick="joinRoom()">Enter Room</button>
        </div>
    </div>

    <div id="crop-modal">
        <img id="crop-prev" style="max-width:300px;">
        <button class="btn-void" onclick="finishCrop()">Apply</button>
    </div>

    <div id="room-ui">
        <div id="video-screen"><div id="player"></div></div>
        <div id="players-layer"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIza...",
            authDomain: "tes-...",
            databaseURL: "https://tes-...",
            projectId: "tes-...",
            storageBucket: "tes-...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let myId = Math.random().toString(36).substring(7);
        let myName = "";
        let myAvatar = "";
        let cropper;

        function startCrop(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('crop-prev').src = ev.target.result;
                document.getElementById('crop-modal').style.display = 'flex';
                cropper = new Cropper(document.getElementById('crop-prev'), {aspectRatio: 1});
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function finishCrop() {
            myAvatar = cropper.getCroppedCanvas().toDataURL('image/jpeg', 0.5);
            document.getElementById('crop-modal').style.display = 'none';
        }

        function joinRoom() {
            myName = document.getElementById('name-in').value || "Guest";
            document.getElementById('menu-overlay').style.display = 'none';
            document.getElementById('room-ui').style.display = 'block';
            document.getElementById('room-ui').style.backgroundImage = "url('Room1.jpg')";

            // نووسینی زانیاری من لە فایەربەیس
            db.ref('presence/' + myId).set({
                name: myName,
                avatar: myAvatar,
                x: window.innerWidth / 2,
                y: window.innerHeight / 2
            });

            // سڕینەوەی من کاتێک پەیجەکە دادەخەم
            db.ref('presence/' + myId).onDisconnect().remove();
        }

        function updateMyLocation(e) {
            if(!myName) return;
            db.ref('presence/' + myId).update({
                x: e.clientX - 60,
                y: e.clientY - 60
            });
        }

        // گوێگرتن لە هەموو بەکارهێنەرەکان
        db.ref('presence').on('value', (snapshot) => {
            const playersLayer = document.getElementById('players-layer');
            playersLayer.innerHTML = ''; // پاککردنەوە و دووبارە دروستکردنەوە
            
            const data = snapshot.val();
            for (let id in data) {
                const p = data[id];
                const charDiv = document.createElement('div');
                charDiv.className = 'character';
                charDiv.style.left = p.x + 'px';
                charDiv.style.top = p.y + 'px';
                charDiv.innerHTML = `
                    <div class="char-name">${p.name}</div>
                    <div class="char-base">
                        <div class="char-photo" style="background-image:url(${p.avatar})"></div>
                    </div>
                `;
                playersLayer.appendChild(charDiv);
            }
        });
    </script>
</body>
</html>
