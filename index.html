<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satoru Hub - Money Effect ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #main-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(15, 15, 15, 0.98); padding: 25px; border-radius: 20px; border: 2px solid #5d34a5; width: 85%; max-width: 360px; z-index: 1000; }
        .file-input { margin: 15px 0; font-size: 14px; background: #222; padding: 10px; border-radius: 8px; width: 90%; color: #888; }
        .start-btn { background: #5d34a5; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        #crop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .crop-container { width: 90%; max-width: 400px; max-height: 70vh; background: #111; overflow: hidden; }
        .crop-controls { margin-top: 20px; display: flex; gap: 10px; }
        .crop-btn { background: #5d34a5; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }
        #chat-input { position: absolute; bottom: 100px; right: 20px; width: 250px; padding: 12px; border-radius: 25px; border: 1px solid #5d34a5; background: rgba(0,0,0,0.6); color: white; backdrop-filter: blur(10px); text-align: center; outline: none; font-size: 16px; z-index: 100; }
        #action-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; z-index: 100; width: 98%; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 20px; backdrop-filter: blur(10px); }
        .act-btn { padding: 10px 0; background: #222; border: 1px solid #5d34a5; color: white; border-radius: 12px; font-size: 18px; cursor: pointer; text-align: center; }
        #room-tag { position: absolute; top: 20px; left: 20px; background: rgba(93, 52, 165, 0.4); padding: 5px 15px; border-radius: 15px; font-size: 14px; border: 1px solid #5d34a5; z-index: 200; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h2 style="color: #5d34a5; margin-bottom: 5px;">Satoru Hub</h2>
        <input type="file" id="avatar-upload" class="file-input" accept="image/*">
        <input type="text" id="user-name" style="width:90%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #333; color:white; border-radius:8px; text-align:center;" value="Ibrahim">
        <button class="start-btn" onclick="enterRoom()">دەستپێکردن ✨</button>
    </div>

    <div id="crop-modal">
        <div class="crop-container"><img id="crop-image" style="max-width: 100%;"></div>
        <div class="crop-controls">
            <button class="crop-btn" onclick="applyCrop()">✅ تەواو</button>
            <button class="crop-btn" style="background:#444;" onclick="closeCrop()">❌ پاشگەزبونەوە</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="room-tag">Lobby</div>
        <input type="text" id="chat-input" placeholder="نامەیەک بنوسە...">
        <div id="action-bar">
            <button class="act-btn" onclick="setAction('dance')">💃</button>
            <button class="act-btn" onclick="setAction('sleep')">😴</button>
            <button class="act-btn" onclick="setAction('money')">💸</button>
            <button class="act-btn" onclick="setAction('shock')">⚡</button>
            <button class="act-btn" onclick="setAction('fly')">🚀</button>
            <button class="act-btn" style="background:#ff4d4d !important;" onclick="location.reload()">🚪</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let player = { x: 0, y: 0, tx: 0, ty: 0, name: "Ibrahim", scaleX: 1 };
        
        let userAvatar = new Image();
        const charImg = new Image(); charImg.src = 'char.png'; 
        const lobbyBg = new Image(); lobbyBg.src = 'room1.jpg';
        const vipBg = new Image(); vipBg.src = 'vip.jpg'; 
        const bubbleImg = new Image(); bubbleImg.src = 'ChatBubble.png';
        const sleepImg = new Image(); sleepImg.src = 'sleep.png';
        const moneyImg = new Image(); moneyImg.src = 'money.png'; // وێنەی پارە

        let currentBg = lobbyBg;
        let currentRoomName = "Lobby";
        let hasAvatar = false, inGame = false, cropper;
        let action = null, timer = 0, chatMessage = "", chatTimer = 0;
        let particles = []; 

        document.getElementById('avatar-upload').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const imgElement = document.getElementById('crop-image');
                imgElement.src = event.target.result;
                document.getElementById('crop-modal').style.display = 'flex';
                if (cropper) cropper.destroy();
                cropper = new Cropper(imgElement, { aspectRatio: 1, viewMode: 1, autoCropArea: 1 });
            };
            reader.readAsDataURL(file);
        };

        function applyCrop() {
            userAvatar.src = cropper.getCroppedCanvas({ width: 200, height: 200 }).toDataURL();
            hasAvatar = true; closeCrop();
        }
        function closeCrop() { document.getElementById('crop-modal').style.display = 'none'; }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        function enterRoom() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            inGame = true; player.name = document.getElementById('user-name').value;
            player.x = canvas.width/2; player.y = canvas.height*0.8; player.tx = player.x; player.ty = player.y;
            loop();
        }

        function setAction(type) { action = type; timer = 150; }

        // فەنکشن بۆ دروستکردنی پارە (ڕێک وەک دڵەکە)
        function spawnMoney() {
            particles.push({
                x: player.x + (Math.random() - 0.5) * 60,
                y: player.y - 120,
                size: 25 + Math.random() * 20,
                speedY: 2 + Math.random() * 3,
                opacity: 1,
                vx: (Math.random() - 0.5) * 4,
                rot: Math.random() * Math.PI * 2,
                rotV: (Math.random() - 0.5) * 0.1
            });
        }

        function loop() {
            if(!inGame) return;

            // Room Logic
            if (player.x > canvas.width - 40 && currentRoomName === "Lobby") {
                currentBg = vipBg; currentRoomName = "VIP Room";
                document.getElementById('room-tag').innerText = "VIP Room 💎";
                player.x = 60; player.tx = 60;
            } else if (player.x < 40 && currentRoomName === "VIP Room") {
                currentBg = lobbyBg; currentRoomName = "Lobby";
                document.getElementById('room-tag').innerText = "Lobby";
                player.x = canvas.width - 60; player.tx = canvas.width - 60;
            }

            player.x += (player.tx - player.x) * 0.1; player.y += (player.ty - player.y) * 0.1;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(currentBg.complete) ctx.drawImage(currentBg, 0, 0, canvas.width, canvas.height);
            
            // Shadow
            ctx.fillStyle = "rgba(0, 0, 0, 0.3)"; 
            ctx.beginPath(); ctx.ellipse(player.x, player.y - 22, 40, 15, 0, 0, Math.PI*2); ctx.fill();

            // Draw Money Particles
            particles.forEach((p, index) => {
                ctx.save();
                ctx.globalAlpha = p.opacity;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                if(moneyImg.complete && moneyImg.width > 0) {
                    ctx.drawImage(moneyImg, -p.size/2, -p.size/2, p.size, p.size);
                }
                ctx.restore();
                p.y -= p.speedY; p.x += p.vx; p.rot += p.rotV; p.opacity -= 0.012;
                if (p.opacity <= 0) particles.splice(index, 1);
            });

            // Chat
            if (chatMessage && chatTimer > 0 && bubbleImg.complete) {
                let bW = 215, bH = 107, bX = player.x - 80, bY = player.y - 240;
                ctx.drawImage(bubbleImg, bX, bY, bW, bH);
                ctx.fillStyle = "black"; ctx.textAlign = "center"; ctx.font = "bold 14px Arial";
                ctx.fillText(chatMessage, bX + 107, bY + 55);
                chatTimer--;
            }

            ctx.save();
            ctx.translate(player.x, player.y);
            let pSize = 160;
            let jump = 0, rot = 0, sc = 1, pX = player.scaleX;

            if (action === 'dance') {
                jump = Math.sin(Date.now() * 0.015) * 15;
                sc = 1 + Math.sin(Date.now() * 0.015) * 0.05;
            } else if (action === 'sleep') {
                rot = Math.PI / 2; jump = 50;
                if(sleepImg.complete) ctx.drawImage(sleepImg, -30, -220, 60, 60);
            } else if (action === 'money') {
                if(Math.random() < 0.2) spawnMoney(); // دروستکردنی پارەی PNG
                sc = 1 + Math.sin(Date.now() * 0.04) * 0.05;
            } else if (action === 'shock') {
                ctx.translate((Math.random()-0.5)*10, 0);
                sc = 0.9 + Math.random() * 0.2;
            } else if (action === 'fly') {
                jump = -Math.abs(Math.sin(Date.now() * 0.01)) * 80;
            }

            ctx.save();
            ctx.translate(0, jump);
            ctx.rotate(rot);

            // Draw Name
            ctx.save(); ctx.scale(pX, 1);
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 15px Arial";
            ctx.fillText(player.name, 0, -135); ctx.restore();

            // Draw Body
            ctx.scale(pX * sc, sc);
            if(charImg.complete) ctx.drawImage(charImg, -pSize/2, -pSize, pSize, pSize);
            if (hasAvatar && userAvatar.complete) ctx.drawImage(userAvatar, -27, -120, 54, 54);
            
            ctx.restore(); 
            ctx.restore(); 

            if (timer > 0) timer--; else action = null;
            requestAnimationFrame(loop);
        }

        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                chatMessage = this.value; chatTimer = 180; this.value = ""; this.blur();
            }
        });

        window.addEventListener('mousedown', (e) => { 
            if(!inGame || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return; 
            player.tx = e.clientX; player.ty = Math.max(canvas.height*0.5, Math.min(canvas.height*0.95, e.clientY)); 
            player.scaleX = (player.tx > player.x) ? 1 : -1; 
        });
    </script>
</body>
</html>
