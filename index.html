<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Satoru Hub - Ultra Luxury ✨</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #8a4fff;
            --gold: linear-gradient(135deg, #ffd700, #ffae00);
            --glass: rgba(15, 15, 15, 0.85);
            --border: rgba(138, 79, 255, 0.5);
        }

        body { 
            margin: 0; 
            background: #020205; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            color: white; 
            touch-action: none; 
            position: fixed; /* Prevents bounce scroll on iOS */
            width: 100%;
            height: 100%;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* Luxury Main Menu */
        #main-ui { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; background: var(--glass); 
            padding: 30px; border-radius: 30px; 
            border: 1px solid var(--border); 
            width: 80%; max-width: 340px; z-index: 1000; 
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, -52%); }
            50% { transform: translate(-50%, -48%); }
        }

        h2 { 
            font-size: 1.8rem; margin-bottom: 20px; 
            background: linear-gradient(to bottom, #fff, #8a4fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .google-btn { 
            background: white; color: #111; border: none; padding: 14px; border-radius: 15px; 
            cursor: pointer; width: 100%; font-weight: 700; font-size: 15px; 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-bottom: 15px;
        }

        .start-btn { 
            background: var(--gold); color: #332100; border: none; 
            padding: 16px; border-radius: 15px; cursor: pointer; width: 100%; 
            font-weight: 800; font-size: 16px; text-transform: uppercase;
        }

        #user-name { 
            width: 100%; padding: 12px; margin-bottom: 20px; 
            background: rgba(255,255,255,0.05); border: 1px solid #333; 
            color: white; border-radius: 12px; text-align: center; outline: none;
            box-sizing: border-box; font-size: 16px; /* Prevents auto-zoom on iOS */
        }

        /* In-Game UI - iPhone Optimized */
        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }

        #chat-input { 
            position: absolute; 
            bottom: calc(110px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 300px; padding: 12px 20px; border-radius: 30px; 
            border: 1px solid var(--border); background: rgba(0,0,0,0.7); 
            color: white; backdrop-filter: blur(15px); text-align: center; 
            outline: none; font-size: 16px; z-index: 100;
        }

        #action-bar { 
            position: absolute; 
            bottom: calc(20px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%); 
            display: flex; gap: 8px; z-index: 100; 
            background: var(--glass); padding: 10px; border-radius: 20px; 
            backdrop-filter: blur(15px); border: 1px solid var(--border);
            width: 90%; max-width: 380px; justify-content: space-around;
        }

        .act-btn { 
            width: 45px; height: 45px; background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.1); color: white; 
            border-radius: 12px; font-size: 20px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
        }

        #room-tag { 
            position: absolute; 
            top: calc(20px + env(safe-area-inset-top)); 
            right: 20px; 
            background: var(--gold); color: #332100; 
            padding: 6px 15px; border-radius: 50px; 
            font-weight: 900; font-size: 12px; z-index: 200;
        }
    </style>
</head>
<body>

    <div id="main-ui">
        <h2>SATORU HUB</h2>
        <button class="google-btn" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/layout/google.svg" width="18">
            بەردەوامبوون بە Google
        </button>
        <div style="margin: 10px 0; color: #888; font-size: 11px;">یان وەک میوان</div>
        <input type="text" id="user-name" placeholder="ناوی بەکارهێنەر" value="Ibrahim">
        <button class="start-btn" onclick="enterRoom()">چوونە ژوورەوە ✨</button>
    </div>

    <div id="game-ui">
        <div id="room-tag">LOBBY</div>
        <input type="text" id="chat-input" placeholder="نامەیەک بنوسە...">
        <div id="action-bar">
            <button class="act-btn" onclick="setAction('dance')">🕺</button>
            <button class="act-btn" onclick="setAction('sleep')">💤</button>
            <button class="act-btn" onclick="setAction('money')">💰</button>
            <button class="act-btn" onclick="setAction('shock')">⚡</button>
            <button class="act-btn" onclick="setAction('fly')">🚀</button>
            <button class="act-btn" style="background: rgba(255, 77, 77, 0.2); border-color: #ff4d4d;" onclick="location.reload()">🚪</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // --- Logic remains exactly as provided ---
        const firebaseConfig = {
            apiKey: "AIzaSyCZOjVeUg4cPILA5eMSGbDURN8qMvCbZJQ",
            authDomain: "satoru-hub-9806d.firebaseapp.com",
            projectId: "satoru-hub-9806d",
            databaseURL: "https://satoru-hub-9806d-default-rtdb.firebaseio.com",
            appId: "1:340283464699:web:c9b3c09ce029d4dd6b895e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let localId = "guest_" + Math.floor(Math.random()*1000);
        let myPlayer = { x: 0, y: 0, tx: 0, ty: 0, name: "Ibrahim", avatar: "", scaleX: 1, action: null, chat: "", chatT: 0 };
        let allPlayers = {};
        
        const charImg = new Image(); charImg.src = 'char.png'; 
        const lobbyBg = new Image(); lobbyBg.src = 'room1.jpg';
        const vipBg = new Image(); vipBg.src = 'vip.jpg'; 
        const bubbleImg = new Image(); bubbleImg.src = 'ChatBubble.png';
        const sleepImg = new Image(); sleepImg.src = 'sleep.png';
        const moneyImg = new Image(); moneyImg.src = 'money.png'; 

        let currentBg = lobbyBg;
        let currentRoomName = "Lobby";
        let inGame = false;
        let particles = [];

        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                localId = result.user.uid;
                myPlayer.name = result.user.displayName;
                myPlayer.avatar = result.user.photoURL;
                enterRoom();
            } catch (e) { alert("کێشە لە لۆگین هەیە"); }
        }

        function enterRoom() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            inGame = true;
            myPlayer.name = document.getElementById('user-name').value || myPlayer.name;
            
            // Initial position based on screen
            resize();
            myPlayer.x = canvas.width/2; 
            myPlayer.y = canvas.height*0.8;
            myPlayer.tx = myPlayer.x; myPlayer.ty = myPlayer.y;

            db.ref('players/' + localId).onDisconnect().remove();
            db.ref('players').on('value', (snap) => {
                allPlayers = snap.val() || {};
            });

            setInterval(() => {
                if(inGame) db.ref('players/' + localId).set(myPlayer);
            }, 50);

            loop();
        }

        function setAction(type) { myPlayer.action = type; setTimeout(() => myPlayer.action = null, 5000); }

        function spawnMoney(x, y) {
            particles.push({
                x: x + (Math.random() - 0.5) * 60,
                y: y - 120,
                size: 25 + Math.random() * 20,
                speedY: 2 + Math.random() * 3,
                opacity: 1,
                vx: (Math.random() - 0.5) * 4,
                rot: Math.random() * Math.PI * 2,
                rotV: (Math.random() - 0.5) * 0.1
            });
        }

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.onresize = resize; 
        resize();

        function loop() {
            if(!inGame) return;

            myPlayer.x += (myPlayer.tx - myPlayer.x) * 0.1;
            myPlayer.y += (myPlayer.ty - myPlayer.y) * 0.1;
            if(myPlayer.chatT > 0) myPlayer.chatT--; else myPlayer.chat = "";

            // Room Switch Logic
            if (myPlayer.x > canvas.width - 40 && currentRoomName === "Lobby") {
                currentBg = vipBg; currentRoomName = "VIP Room";
                document.getElementById('room-tag').innerText = "VIP ROOM 💎";
                myPlayer.x = 60; myPlayer.tx = 60;
            } else if (myPlayer.x < 40 && currentRoomName === "VIP Room") {
                currentBg = lobbyBg; currentRoomName = "Lobby";
                document.getElementById('room-tag').innerText = "LOBBY";
                myPlayer.x = canvas.width - 60; myPlayer.tx = canvas.width - 60;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(currentBg.complete) ctx.drawImage(currentBg, 0, 0, canvas.width, canvas.height);

            particles.forEach((p, index) => {
                ctx.save();
                ctx.globalAlpha = p.opacity;
                ctx.translate(p.x, p.y); ctx.rotate(p.rot);
                if(moneyImg.complete) ctx.drawImage(moneyImg, -p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
                p.y -= p.speedY; p.x += p.vx; p.rot += p.rotV; p.opacity -= 0.012;
                if (p.opacity <= 0) particles.splice(index, 1);
            });

            Object.keys(allPlayers).forEach(id => {
                drawPlayer(allPlayers[id]);
            });

            requestAnimationFrame(loop);
        }

        function drawPlayer(p) {
            ctx.save();
            ctx.translate(p.x, p.y);
            
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.beginPath(); ctx.ellipse(0, -22, 45, 18, 0, 0, Math.PI*2); ctx.fill();

            if (p.chat && bubbleImg.complete) {
                ctx.drawImage(bubbleImg, -80, -240, 215, 107);
                ctx.fillStyle = "black"; ctx.textAlign = "center"; ctx.font = "bold 14px Arial";
                ctx.fillText(p.chat, 27, -185);
            }

            let jump = 0, rot = 0;
            if (p.action === 'dance') jump = Math.sin(Date.now() * 0.015) * 15;
            if (p.action === 'money') { if(Math.random() < 0.2) spawnMoney(p.x, p.y); }
            if (p.action === 'fly') jump = -Math.abs(Math.sin(Date.now() * 0.01)) * 80;
            if (p.action === 'sleep') { 
                rot = Math.PI / 2; jump = 50;
                if(sleepImg.complete) ctx.drawImage(sleepImg, -30, -220, 60, 60);
            }

            ctx.translate(0, jump);
            ctx.rotate(rot);

            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 15px sans-serif";
            ctx.fillText(p.name, 0, -135);

            ctx.scale(p.scaleX, 1);
            if(charImg.complete) ctx.drawImage(charImg, -80, -160, 160, 160);
            
            if(p.avatar) {
                let av = new Image(); av.src = p.avatar;
                ctx.save();
                ctx.beginPath(); ctx.arc(0, -120, 27, 0, Math.PI*2); ctx.clip();
                if(av.complete) ctx.drawImage(av, -27, -147, 54, 54);
                ctx.restore();
            }
            ctx.restore();
        }

        // --- Improved Touch & Click Handling for iPhone ---
        function handleInput(clientX, clientY, target) {
            if(!inGame || target.tagName === 'INPUT' || target.closest('button')) return; 
            myPlayer.tx = clientX; 
            myPlayer.ty = Math.max(canvas.height*0.5, Math.min(canvas.height*0.95, clientY)); 
            myPlayer.scaleX = (myPlayer.tx > myPlayer.x) ? 1 : -1; 
        }

        window.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY, e.target));
        
        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY, e.target);
        }, { passive: false });

        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                myPlayer.chat = this.value; myPlayer.chatT = 180;
                this.value = ""; this.blur();
            }
        });
    </script>
</body>
</html>
