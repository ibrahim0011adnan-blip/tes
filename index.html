<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Satoru Hub - Tomato & Money ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #main-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(15, 15, 15, 0.98); padding: 25px; border-radius: 20px; border: 2px solid #5d34a5; width: 85%; max-width: 360px; z-index: 1000; box-shadow: 0 0 30px rgba(93, 52, 165, 0.3); }
        .file-input { margin: 15px 0; font-size: 14px; background: #222; padding: 10px; border-radius: 8px; width: 90%; color: #888; }
        .start-btn { background: #5d34a5; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        
        #crop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .crop-container { width: 90%; max-width: 400px; max-height: 70vh; background: #111; overflow: hidden; }
        .crop-controls { margin-top: 20px; display: flex; gap: 10px; }
        .crop-btn { background: #5d34a5; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }

        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }
        #chat-input { position: absolute; bottom: 100px; right: 20px; width: 250px; padding: 12px; border-radius: 25px; border: 1px solid #5d34a5; background: rgba(0,0,0,0.6); color: white; backdrop-filter: blur(10px); text-align: center; outline: none; z-index: 100; }
        
        #action-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; z-index: 100; width: 98%; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 20px; backdrop-filter: blur(10px); }
        .act-btn { padding: 10px 0; background: #222; border: 1px solid #5d34a5; color: white; border-radius: 12px; font-size: 18px; cursor: pointer; }
        #room-tag { position: absolute; top: 20px; left: 20px; background: rgba(93, 52, 165, 0.4); padding: 5px 15px; border-radius: 15px; font-size: 14px; border: 1px solid #5d34a5; z-index: 200; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h2 style="color: #8a4fff; margin-bottom: 10px;">Satoru Hub</h2>
        <input type="file" id="avatar-upload" class="file-input" accept="image/*">
        <input type="text" id="user-name" style="width:90%; padding:10px; margin-bottom:15px; background:#111; border:1px solid #333; color:white; border-radius:8px; text-align:center;" value="Ibrahim">
        <button class="start-btn" onclick="enterRoom()">دەستپێکردن 🚀</button>
    </div>

    <div id="crop-modal">
        <div class="crop-container"><img id="crop-image" style="max-width: 100%;"></div>
        <div class="crop-controls">
            <button class="crop-btn" onclick="applyCrop()">✅ تەواو</button>
            <button class="crop-btn" style="background:#444;" onclick="closeCrop()">❌ پاشگەزبونەوە</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="room-tag">Lobby</div>
        <input type="text" id="chat-input" placeholder="نامەیەک بنوسە...">
        <div id="action-bar">
            <button class="act-btn" onclick="setAction('dance')">💃</button>
            <button class="act-btn" onclick="setAction('sleep')">😴</button>
            <button class="act-btn" onclick="setAction('money')">💸</button>
            <button class="act-btn" onclick="shootTomato()" style="background: #4a1a1a;">🍅</button>
            <button class="act-btn" onclick="setAction('shock')">⚡</button>
            <button class="act-btn" onclick="setAction('fly')">🚀</button>
            <button class="act-btn" style="background:#ff4d4d !important;" onclick="location.reload()">🚪</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCZOjVeUg4cPILA5eMSGbDURN8qMvCbZJQ",
            authDomain: "satoru-hub-9806d.firebaseapp.com",
            projectId: "satoru-hub-9806d",
            databaseURL: "https://satoru-hub-9806d-default-rtdb.firebaseio.com",
            appId: "1:340283464699:web:c9b3c09ce029d4dd6b895e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let localId = "user_" + Math.random().toString(36).substr(2, 9);
        
        let myPlayer = { x: 0, y: 0, tx: 0, ty: 0, name: "Ibrahim", avatar: "", scaleX: 1, action: null, chat: "", chatT: 0, hitT: 0 };
        let allPlayers = {};
        let tomatoes = [];
        let particles = [];
        let avatarCache = {};

        const charImg = new Image(); charImg.src = 'char.png'; 
        const lobbyBg = new Image(); lobbyBg.src = 'room1.jpg';
        const vipBg = new Image(); vipBg.src = 'vip.jpg'; 
        const bubbleImg = new Image(); bubbleImg.src = 'ChatBubble.png';
        const moneyImg = new Image(); moneyImg.src = 'money.png';
        const sleepImg = new Image(); sleepImg.src = 'sleep.png';

        let currentBg = lobbyBg, currentRoomName = "Lobby", inGame = false, cropper;

        // Avatar Upload Logic
        document.getElementById('avatar-upload').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const imgElement = document.getElementById('crop-image');
                imgElement.src = event.target.result;
                document.getElementById('crop-modal').style.display = 'flex';
                if (cropper) cropper.destroy();
                cropper = new Cropper(imgElement, { aspectRatio: 1, viewMode: 1 });
            };
            reader.readAsDataURL(file);
        };

        function applyCrop() {
            myPlayer.avatar = cropper.getCroppedCanvas({ width: 100, height: 100 }).toDataURL();
            document.getElementById('crop-modal').style.display = 'none';
        }
        function closeCrop() { document.getElementById('crop-modal').style.display = 'none'; }

        function enterRoom() {
            const name = document.getElementById('user-name').value.trim();
            if(!name) return alert("ناوەکەت بنوسە!");
            myPlayer.name = name;
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            inGame = true;
            myPlayer.x = canvas.width/2; myPlayer.y = canvas.height*0.8;
            myPlayer.tx = myPlayer.x; myPlayer.ty = myPlayer.y;

            db.ref('players/' + localId).onDisconnect().remove();
            db.ref('players').on('value', (snap) => { allPlayers = snap.val() || {}; });
            
            db.ref('global_tomatoes').on('child_added', (snap) => {
                const data = snap.val();
                if(data.owner !== localId) tomatoes.push(data);
                setTimeout(() => db.ref('global_tomatoes').child(snap.key).remove(), 2000);
            });

            setInterval(() => { if(inGame) db.ref('players/' + localId).set(myPlayer); }, 50);
            loop();
        }

        function setAction(type) { 
            myPlayer.action = type; 
            setTimeout(() => { if(myPlayer.action === type) myPlayer.action = null; }, 5000); 
        }

        function shootTomato() {
            const tData = { owner: localId, x: myPlayer.x, y: myPlayer.y - 80, vx: myPlayer.scaleX * 12, vy: -5, life: 120 };
            tomatoes.push(tData);
            db.ref('global_tomatoes').push(tData);
        }

        function spawnMoney(x, y) {
            particles.push({
                x: x + (Math.random()-0.5)*60, y: y-120, size: 25, speedY: 3, opacity: 1, vx: (Math.random()-0.5)*4, rot: 0, rotV: 0.1
            });
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        function loop() {
            if(!inGame) return;

            myPlayer.x += (myPlayer.tx - myPlayer.x) * 0.1;
            myPlayer.y += (myPlayer.ty - myPlayer.y) * 0.1;
            if(myPlayer.chatT > 0) myPlayer.chatT--; else myPlayer.chat = "";
            if(myPlayer.hitT > 0) myPlayer.hitT--;

            // Room Switch
            if (myPlayer.x > canvas.width - 40 && currentRoomName === "Lobby") {
                currentBg = vipBg; currentRoomName = "VIP Room";
                document.getElementById('room-tag').innerText = "VIP Room 💎";
                myPlayer.x = 60; myPlayer.tx = 60;
            } else if (myPlayer.x < 40 && currentRoomName === "VIP Room") {
                currentBg = lobbyBg; currentRoomName = "Lobby";
                document.getElementById('room-tag').innerText = "Lobby";
                myPlayer.x = canvas.width - 60; myPlayer.tx = canvas.width - 60;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(currentBg.complete) ctx.drawImage(currentBg, 0, 0, canvas.width, canvas.height);

            // Tomatoes
            tomatoes.forEach((t, i) => {
                t.x += t.vx; t.y += t.vy; t.vy += 0.25; t.life--;
                ctx.font = "24px Arial"; ctx.fillText("🍅", t.x - 12, t.y);
                let dist = Math.hypot(t.x - myPlayer.x, t.y - (myPlayer.y - 80));
                if (dist < 50 && t.owner !== localId && myPlayer.hitT === 0) { myPlayer.hitT = 60; t.life = 0; }
                if (t.life <= 0) tomatoes.splice(i, 1);
            });

            // Particles
            particles.forEach((p, i) => {
                ctx.save(); ctx.globalAlpha = p.opacity; ctx.translate(p.x, p.y);
                if(moneyImg.complete) ctx.drawImage(moneyImg, -12, -12, 25, 25);
                ctx.restore();
                p.y -= 3; p.opacity -= 0.015;
                if(p.opacity <= 0) particles.splice(i, 1);
            });

            // Draw Players
            Object.keys(allPlayers).forEach(id => {
                const p = allPlayers[id];
                ctx.save(); ctx.translate(p.x, p.y);
                
                if (p.chat && bubbleImg.complete) {
                    ctx.drawImage(bubbleImg, -80, -240, 215, 107);
                    ctx.fillStyle = "black"; ctx.textAlign = "center"; ctx.font="bold 14px Arial"; ctx.fillText(p.chat, 27, -185);
                }

                let jump = (p.action === 'dance') ? Math.sin(Date.now() * 0.015) * 15 : 0;
                let rot = (p.action === 'sleep') ? Math.PI/2 : 0;
                if(p.action === 'sleep' && sleepImg.complete) ctx.drawImage(sleepImg, -30, -220, 60, 60);
                if (p.action === 'money' && Math.random() < 0.1) spawnMoney(p.x, p.y);
                
                ctx.translate(0, jump);
                ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 16px Arial";
                ctx.fillText(p.name, 0, -135);

                ctx.scale(p.scaleX, 1);
                ctx.rotate(rot);
                if (p.hitT > 0) ctx.filter = "sepia(1) saturate(10) hue-rotate(-50deg)";
                if(charImg.complete) ctx.drawImage(charImg, -80, -160, 160, 160);
                ctx.filter = "none";
                
                if(p.avatar) {
                    if(!avatarCache[p.avatar]) { avatarCache[p.avatar] = new Image(); avatarCache[p.avatar].src = p.avatar; }
                    if(avatarCache[p.avatar].complete) ctx.drawImage(avatarCache[p.avatar], -27, -118, 54, 54);
                }
                ctx.restore();
            });

            requestAnimationFrame(loop);
        }

        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                myPlayer.chat = this.value; myPlayer.chatT = 200;
                this.value = ""; this.blur();
            }
        });

        window.addEventListener('mousedown', (e) => { 
            if(!inGame || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return; 
            myPlayer.tx = e.clientX; 
            myPlayer.ty = Math.max(canvas.height*0.5, Math.min(canvas.height*0.95, e.clientY)); 
            myPlayer.scaleX = (myPlayer.tx > myPlayer.x) ? 1 : -1; 
        });
    </script>
</body>
</html>
