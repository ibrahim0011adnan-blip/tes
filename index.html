<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Satoru Hub - All Animations ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <style>
        :root {
            --primary: #8a4fff;
            --gold: linear-gradient(135deg, #ffd700, #ffae00);
            --glass: rgba(15, 15, 15, 0.95);
            --border: rgba(138, 79, 255, 0.5);
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body { 
            margin: 0; background: #020205; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            color: white; touch-action: none; position: fixed; width: 100%; height: 100%;
        }

        canvas { display: block; width: 100%; height: 100%; touch-action: none; }

        /* UI Login */
        #main-ui { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; background: var(--glass); padding: 30px; border-radius: 30px; 
            border: 1px solid var(--border); width: 85%; max-width: 360px; z-index: 1000; 
            backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .file-input { margin: 15px 0; background: #222; padding: 10px; border-radius: 12px; width: 100%; color: #888; border: 1px solid #333; }
        
        .start-btn { 
            background: var(--gold); color: #332100; border: none; padding: 16px; border-radius: 15px; 
            cursor: pointer; width: 100%; font-weight: 800; font-size: 16px; text-transform: uppercase;
        }

        #user-name { 
            width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.05); 
            border: 1px solid #333; color: white; border-radius: 12px; text-align: center; font-size: 16px;
        }

        /* Crop Modal */
        #crop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .crop-container { width: 90%; max-width: 400px; background: #111; border-radius: 15px; overflow: hidden; }
        .crop-controls { margin-top: 20px; display: flex; gap: 15px; }
        .crop-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; }

        /* Game UI */
        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }
        #chat-input { 
            position: absolute; bottom: calc(110px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%); width: 80%; max-width: 300px; 
            padding: 12px 20px; border-radius: 30px; border: 1px solid var(--border); 
            background: rgba(0,0,0,0.7); color: white; backdrop-filter: blur(15px); text-align: center; font-size: 16px; z-index: 100;
        }

        #action-bar { 
            position: absolute; bottom: calc(20px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; z-index: 100; 
            background: var(--glass); padding: 10px; border-radius: 20px; border: 1px solid var(--border); width: 94%; max-width: 420px;
        }

        .act-btn { height: 45px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #room-tag { position: absolute; top: calc(20px + env(safe-area-inset-top)); right: 20px; background: var(--gold); color: #332100; padding: 6px 15px; border-radius: 50px; font-weight: 900; font-size: 12px; z-index: 200; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h2 style="color: #8a4fff; margin-top: 0;">SATORU HUB</h2>
        <input type="file" id="avatar-upload" class="file-input" accept="image/*">
        <input type="text" id="user-name" placeholder="ناوی بەکارهێنەر" value="Ibrahim">
        <button class="start-btn" onclick="enterRoom()">دەستپێکردن ✨</button>
    </div>

    <div id="crop-modal">
        <div class="crop-container"><img id="crop-image" style="max-width: 100%;"></div>
        <div class="crop-controls">
            <button class="crop-btn" onclick="applyCrop()">✅ تەواو</button>
            <button class="crop-btn" style="background:#444;" onclick="closeCrop()">❌ لابردن</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="room-tag">LOBBY</div>
        <input type="text" id="chat-input" placeholder="نامەیەک بنوسە...">
        <div id="action-bar">
            <button class="act-btn" onclick="setAction('dance')">🕺</button>
            <button class="act-btn" onclick="setAction('sleep')">💤</button>
            <button class="act-btn" onclick="setAction('money')">💰</button>
            <button class="act-btn" onclick="setAction('heart')">❤️</button>
            <button class="act-btn" onclick="setAction('shock')">⚡</button>
            <button class="act-btn" onclick="setAction('fly')">🚀</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let player = { x: 0, y: 0, tx: 0, ty: 0, name: "Ibrahim", scaleX: 1, action: null, timer: 0, chat: "", chatT: 0 };
        
        let userAvatar = new Image();
        const charImg = new Image(); charImg.src = 'char.png'; 
        const lobbyBg = new Image(); lobbyBg.src = 'room1.jpg';
        const vipBg = new Image(); vipBg.src = 'vip.jpg'; 
        const bubbleImg = new Image(); bubbleImg.src = 'ChatBubble.png';
        const sleepImg = new Image(); sleepImg.src = 'sleep.png';
        const moneyImg = new Image(); moneyImg.src = 'money.png'; 

        let currentBg = lobbyBg;
        let currentRoomName = "Lobby";
        let hasAvatar = false, inGame = false, cropper;
        let particles = []; 

        document.getElementById('avatar-upload').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const imgElement = document.getElementById('crop-image');
                imgElement.src = event.target.result;
                document.getElementById('crop-modal').style.display = 'flex';
                if (cropper) cropper.destroy();
                cropper = new Cropper(imgElement, { aspectRatio: 1, viewMode: 1 });
            };
            reader.readAsDataURL(file);
        };

        function applyCrop() {
            userAvatar.src = cropper.getCroppedCanvas({ width: 150, height: 150 }).toDataURL();
            hasAvatar = true; closeCrop();
        }
        function closeCrop() { document.getElementById('crop-modal').style.display = 'none'; }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        function enterRoom() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            inGame = true; player.name = document.getElementById('user-name').value;
            player.x = canvas.width/2; player.y = canvas.height*0.8; player.tx = player.x; player.ty = player.y;
            loop();
        }

        function setAction(type) { player.action = type; player.timer = 180; }

        function spawnParticle(type) {
            particles.push({
                x: player.x + (Math.random() - 0.5) * 60,
                y: player.y - 120,
                size: type === 'heart' ? 22 + Math.random()*10 : 25 + Math.random()*20,
                speedY: 2 + Math.random() * 2,
                opacity: 1,
                vx: (Math.random() - 0.5) * 4,
                type: type,
                rot: Math.random() * Math.PI,
                text: type === 'heart' ? '❤️' : null
            });
        }

        function loop() {
            if(!inGame) return;

            // Room Logic
            if (player.x > canvas.width - 40 && currentRoomName === "Lobby") {
                currentBg = vipBg; currentRoomName = "VIP Room";
                document.getElementById('room-tag').innerText = "VIP ROOM 💎";
                player.x = 60; player.tx = 60;
            } else if (player.x < 40 && currentRoomName === "VIP Room") {
                currentBg = lobbyBg; currentRoomName = "Lobby";
                document.getElementById('room-tag').innerText = "LOBBY";
                player.x = canvas.width - 60; player.tx = canvas.width - 60;
            }

            player.x += (player.tx - player.x) * 0.1;
            player.y += (player.ty - player.y) * 0.1;
            if(player.chatT > 0) player.chatT--; else player.chat = "";

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(currentBg.complete) ctx.drawImage(currentBg, 0, 0, canvas.width, canvas.height);
            
            // Particles
            particles.forEach((p, index) => {
                ctx.save();
                ctx.globalAlpha = p.opacity;
                if(p.type === 'money' && moneyImg.complete) {
                    ctx.translate(p.x, p.y); ctx.rotate(p.rot);
                    ctx.drawImage(moneyImg, -p.size/2, -p.size/2, p.size, p.size);
                } else if(p.type === 'heart') {
                    ctx.font = `${p.size}px Arial`;
                    ctx.fillText(p.text, p.x, p.y);
                }
                ctx.restore();
                p.y -= p.speedY; p.x += p.vx; p.opacity -= 0.015;
                if (p.opacity <= 0) particles.splice(index, 1);
            });

            drawPlayer();
            if (player.timer > 0) player.timer--; else player.action = null;
            requestAnimationFrame(loop);
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Shadow
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.beginPath(); ctx.ellipse(0, -20, 40, 15, 0, 0, Math.PI*2); ctx.fill();

            // Chat
            if (player.chat && bubbleImg.complete) {
                ctx.drawImage(bubbleImg, -85, -240, 200, 100);
                ctx.fillStyle = "black"; ctx.textAlign = "center"; ctx.font = "bold 14px Arial";
                ctx.fillText(player.chat, 15, -185);
            }

            let jump = 0, rot = 0, sc = 1, shake = 0;
            
            if (player.action === 'dance') jump = Math.sin(Date.now() * 0.015) * 15;
            if (player.action === 'money' && Math.random() < 0.2) spawnParticle('money');
            if (player.action === 'heart' && Math.random() < 0.2) spawnParticle('heart');
            if (player.action === 'fly') jump = -Math.abs(Math.sin(Date.now() * 0.01)) * 100;
            if (player.action === 'shock') shake = (Math.random() - 0.5) * 10;
            if (player.action === 'sleep') {
                rot = Math.PI / 2; jump = 50;
                if(sleepImg.complete) ctx.drawImage(sleepImg, -30, -220, 60, 60);
            }

            ctx.translate(shake, jump);
            ctx.rotate(rot);

            // Name
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 15px sans-serif";
            ctx.fillText(player.name, 0, -135);

            ctx.scale(player.scaleX, 1);
            if(charImg.complete) ctx.drawImage(charImg, -80, -160, 160, 160);
            
            if(hasAvatar && userAvatar.complete) {
                ctx.save();
                ctx.beginPath(); ctx.arc(0, -120, 26, 0, Math.PI*2); ctx.clip();
                ctx.drawImage(userAvatar, -26, -146, 52, 52);
                ctx.restore();
            }
            ctx.restore();
        }

        // iPhone Inputs
        function handleInput(clientX, clientY, target) {
            if(!inGame || target.tagName === 'INPUT' || target.closest('button')) return; 
            player.tx = clientX; 
            player.ty = Math.max(canvas.height*0.45, Math.min(canvas.height*0.95, clientY)); 
            player.scaleX = (player.tx > player.x) ? 1 : -1; 
        }

        window.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY, e.target));
        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY, e.target);
            if (inGame && e.target.tagName === 'CANVAS') e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY, e.target);
            if (inGame && e.target.tagName === 'CANVAS') e.preventDefault();
        }, { passive: false });

        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                player.chat = this.value; player.chatT = 180;
                this.value = ""; this.blur();
            }
        });
    </script>
</body>
</html>
