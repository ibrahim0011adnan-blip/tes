<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Satoru Hub - Google Login & Tomato Fight 🍅</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #main-ui { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; background: rgba(15, 15, 15, 0.98); padding: 35px; 
            border-radius: 25px; border: 2px solid #5d34a5; width: 85%; max-width: 360px; 
            z-index: 1000; box-shadow: 0 0 40px rgba(93, 52, 165, 0.4); backdrop-filter: blur(10px);
        }
        
        .google-btn { 
            background: white; color: #444; border: none; padding: 15px; border-radius: 15px; 
            cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-top: 25px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .google-btn:hover { background: #f1f1f1; transform: translateY(-2px); }
        .google-btn:active { transform: scale(0.98); }
        
        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }
        
        #chat-input { 
            position: absolute; bottom: 100px; right: 20px; width: 250px; padding: 15px; 
            border-radius: 30px; border: 1px solid #5d34a5; background: rgba(0,0,0,0.7); 
            color: white; text-align: center; outline: none; z-index: 100; backdrop-filter: blur(10px);
        }
        
        #action-bar { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; 
            z-index: 100; width: 96%; max-width: 550px; background: rgba(0,0,0,0.8); 
            padding: 12px; border-radius: 25px; border: 1px solid rgba(93, 52, 165, 0.3); backdrop-filter: blur(15px);
        }
        
        .act-btn { padding: 12px 0; background: #1a1a1a; border: 1px solid #5d34a5; color: white; border-radius: 12px; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .act-btn:active { transform: scale(0.9); }

        #room-tag { 
            position: absolute; top: 30px; left: 20px; background: rgba(93, 52, 165, 0.5); 
            padding: 8px 20px; border-radius: 20px; font-weight: bold; border: 1px solid #5d34a5; z-index: 200; 
        }
    </style>
</head>
<body>

    <div id="main-ui">
        <h1 style="color: #8a4fff; margin-bottom: 5px;">Satoru Hub</h1>
        <p style="color: #888; font-size: 14px;">بەخێربێیت، تکایە بچۆ ژوورەوە</p>
        <button class="google-btn" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/layout/google.svg" width="20">
            بەردەوامبوون بە Google
        </button>
    </div>

    <div id="game-ui">
        <div id="room-tag">Lobby</div>
        <input type="text" id="chat-input" placeholder="نامەیەک بنوسە...">
        <div id="action-bar">
            <button class="act-btn" title="Dance" onclick="setAction('dance')">💃</button>
            <button class="act-btn" title="Sleep" onclick="setAction('sleep')">😴</button>
            <button class="act-btn" title="Money" onclick="setAction('money')">💸</button>
            <button class="act-btn" title="Shoot Tomato" onclick="shootTomato()" style="background: #4a1a1a;">🍅</button>
            <button class="act-btn" title="Shock" onclick="setAction('shock')">⚡</button>
            <button class="act-btn" title="Fly" onclick="setAction('fly')">🚀</button>
            <button class="act-btn" title="Exit" style="background:#ff4d4d !important; border:none;" onclick="location.reload()">🚪</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // --- 1. Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyCZOjVeUg4cPILA5eMSGbDURN8qMvCbZJQ",
            authDomain: "satoru-hub-9806d.firebaseapp.com",
            projectId: "satoru-hub-9806d",
            databaseURL: "https://satoru-hub-9806d-default-rtdb.firebaseio.com",
            appId: "1:340283464699:web:c9b3c09ce029d4dd6b895e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- 2. Game Objects ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let localId = null;
        let myPlayer = { x: 0, y: 0, tx: 0, ty: 0, name: "", avatar: "", scaleX: 1, action: null, chat: "", chatT: 0, hitT: 0 };
        let allPlayers = {};
        let avatarCache = {};
        let tomatoes = [];
        let particles = [];

        const charImg = new Image(); charImg.src = 'char.png'; 
        const lobbyBg = new Image(); lobbyBg.src = 'room1.jpg';
        const vipBg = new Image(); vipBg.src = 'vip.jpg'; 
        const bubbleImg = new Image(); bubbleImg.src = 'ChatBubble.png';
        const moneyImg = new Image(); moneyImg.src = 'money.png'; 

        let currentBg = lobbyBg;
        let currentRoomName = "Lobby";
        let inGame = false;

        // --- 3. Google Login ---
        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                localId = result.user.uid;
                myPlayer.name = result.user.displayName.split(' ')[0];
                myPlayer.avatar = result.user.photoURL;
                enterRoom();
            } catch (e) { 
                console.error(e);
                alert("ناتوانرێت بچیتە ژوورەوە، دڵنیابەرەوە لە ڕێکخستنی Firebase"); 
            }
        }

        function enterRoom() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            inGame = true;
            
            myPlayer.x = canvas.width/2; myPlayer.y = canvas.height*0.8;
            myPlayer.tx = myPlayer.x; myPlayer.ty = myPlayer.y;

            // Sync Database
            db.ref('players/' + localId).onDisconnect().remove();
            db.ref('players').on('value', (snap) => { allPlayers = snap.val() || {}; });
            
            // Listen for global tomatoes
            db.ref('global_tomatoes').on('child_added', (snap) => {
                const data = snap.val();
                if(data.owner !== localId) tomatoes.push(data);
                // پاککردنەوەی داتا کۆنەکان لە فایەربەیس بۆ ئەوەی داتابەیسەکە پڕ نەبێت
                setTimeout(() => db.ref('global_tomatoes').child(snap.key).remove(), 2000);
            });

            setInterval(() => { if(inGame) db.ref('players/' + localId).set(myPlayer); }, 50);
            loop();
        }

        // --- 4. Logic & Actions ---
        function setAction(type) { 
            myPlayer.action = type; 
            setTimeout(() => { if(myPlayer.action === type) myPlayer.action = null; }, 5000); 
        }

        function shootTomato() {
            const tData = {
                owner: localId,
                x: myPlayer.x,
                y: myPlayer.y - 80,
                vx: myPlayer.scaleX * 12,
                vy: -5,
                life: 120
            };
            tomatoes.push(tData);
            db.ref('global_tomatoes').push(tData);
        }

        function spawnMoney(x, y) {
            particles.push({
                x: x + (Math.random()-0.5)*60, y: y-120, size: 25, speedY: 3, opacity: 1
            });
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        function loop() {
            if(!inGame) return;

            // Player movement
            myPlayer.x += (myPlayer.tx - myPlayer.x) * 0.1;
            myPlayer.y += (myPlayer.ty - myPlayer.y) * 0.1;
            if(myPlayer.chatT > 0) myPlayer.chatT--; else myPlayer.chat = "";
            if(myPlayer.hitT > 0) myPlayer.hitT--;

            // Room Switch Logic
            if (myPlayer.x > canvas.width - 40 && currentRoomName === "Lobby") {
                currentBg = vipBg; currentRoomName = "VIP Room";
                document.getElementById('room-tag').innerText = "VIP Room 💎";
                myPlayer.x = 60; myPlayer.tx = 60;
            } else if (myPlayer.x < 40 && currentRoomName === "VIP Room") {
                currentBg = lobbyBg; currentRoomName = "Lobby";
                document.getElementById('room-tag').innerText = "Lobby";
                myPlayer.x = canvas.width - 60; myPlayer.tx = canvas.width - 60;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(currentBg.complete) ctx.drawImage(currentBg, 0, 0, canvas.width, canvas.height);

            // Tomatoes Logic
            tomatoes.forEach((t, i) => {
                t.x += t.vx; t.y += t.vy; t.vy += 0.25; t.life--;
                ctx.font = "24px Arial";
                ctx.fillText("🍅", t.x - 12, t.y);

                let dist = Math.hypot(t.x - myPlayer.x, t.y - (myPlayer.y - 80));
                if (dist < 50 && t.owner !== localId && myPlayer.hitT === 0) {
                    myPlayer.hitT = 60; // 1 second red effect
                    t.life = 0;
                }
                if (t.life <= 0) tomatoes.splice(i, 1);
            });

            // Draw All Players
            Object.keys(allPlayers).forEach(id => {
                const p = allPlayers[id];
                ctx.save();
                ctx.translate(p.x, p.y);
                
                // Shadow
                ctx.fillStyle = "rgba(0,0,0,0.2)";
                ctx.beginPath(); ctx.ellipse(0, -22, 40, 15, 0, 0, Math.PI*2); ctx.fill();

                // Chat Bubble
                if (p.chat && bubbleImg.complete) {
                    ctx.drawImage(bubbleImg, -80, -240, 215, 107);
                    ctx.fillStyle = "black"; ctx.textAlign = "center"; ctx.font = "bold 14px Arial";
                    ctx.fillText(p.chat, 27, -185);
                }

                let jump = (p.action === 'dance') ? Math.sin(Date.now() * 0.015) * 15 : 0;
                if (p.action === 'money' && Math.random() < 0.1) spawnMoney(p.x, p.y);
                
                ctx.translate(0, jump);

                // Name
                ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 16px Arial";
                ctx.fillText(p.name, 0, -135);

                // Body & Hit Effect
                ctx.scale(p.scaleX, 1);
                if (p.hitT > 0) ctx.filter = "sepia(1) saturate(10) hue-rotate(-50deg)";
                if(charImg.complete) ctx.drawImage(charImg, -80, -160, 160, 160);
                ctx.filter = "none";
                
                // Square Avatar on Chest
                if(p.avatar) {
                    if(!avatarCache[p.avatar]) {
                        avatarCache[p.avatar] = new Image();
                        avatarCache[p.avatar].src = p.avatar;
                        avatarCache[p.avatar].crossOrigin = "anonymous";
                    }
                    if(avatarCache[p.avatar].complete) {
                        ctx.drawImage(avatarCache[p.avatar], -27, -118, 54, 54);
                    }
                }
                ctx.restore();
            });

            // Money Particles
            particles.forEach((p, i) => {
                ctx.save(); ctx.globalAlpha = p.opacity;
                if(moneyImg.complete) ctx.drawImage(moneyImg, p.x-12, p.y-12, 25, 25);
                ctx.restore();
                p.y -= 3; p.opacity -= 0.015;
                if(p.opacity <= 0) particles.splice(i, 1);
            });

            requestAnimationFrame(loop);
        }

        // --- 5. Controls ---
        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                myPlayer.chat = this.value; myPlayer.chatT = 200;
                this.value = ""; this.blur();
            }
        });

        window.addEventListener('mousedown', (e) => { 
            if(!inGame || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return; 
            myPlayer.tx = e.clientX; 
            myPlayer.ty = Math.max(canvas.height*0.5, Math.min(canvas.height*0.95, e.clientY)); 
            myPlayer.scaleX = (myPlayer.tx > myPlayer.x) ? 1 : -1; 
        });
    </script>
</body>
</html>
